name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bundle Python 3.12 for macOS (Homebrew relocatable copy)
        run: |
          BUNDLE_DIR="python/bundle"
          if [ ! -f "$BUNDLE_DIR/bin/python3.12" ]; then
            echo "Installing Python 3.12 via Homebrew..."
            brew install python@3.12

            PYTHON_CELLAR=$(brew --cellar python@3.12)
            echo "Python Cellar at: $PYTHON_CELLAR"
            echo "Cellar contents:"
            ls "$PYTHON_CELLAR/"

            mkdir -p "$BUNDLE_DIR"
            echo "Copying Cellar..."
            cp -R "$PYTHON_CELLAR" "$BUNDLE_DIR/Cellar_python"
            echo "After copy:"
            ls "$BUNDLE_DIR/Cellar_python/"
            ls "$BUNDLE_DIR/Cellar_python/python@3.12/"

            # 找到版本目录（如 3.12.12_2）
            PYTHON_VERSION_DIR=$(ls "$BUNDLE_DIR/Cellar_python/python@3.12/" | grep -E '^[0-9]' | head -1)
            echo "Version dir: $PYTHON_VERSION_DIR"
            PYTHON_INSTALLED="$BUNDLE_DIR/Cellar_python/python@3.12/$PYTHON_VERSION_DIR"
            echo "Python installed at: $PYTHON_INSTALLED"
            echo "Bin contents:"
            ls "$PYTHON_INSTALLED/bin/" | grep python || echo "NO BIN DIRECTORY"

            mkdir -p "$BUNDLE_DIR/bin"
            ln -sf "$PYTHON_INSTALLED/bin/python3.12" "$BUNDLE_DIR/bin/python3.12"
            ln -sf "$PYTHON_INSTALLED/bin/pip3" "$BUNDLE_DIR/bin/pip3" 2>/dev/null || true

            echo "Bundle contents:"
            ls "$BUNDLE_DIR/"
            echo "Symlink check:"
            ls -la "$BUNDLE_DIR/bin/"
          else
            echo "Python already bundled, skipping."
          fi

          echo "Installing openpyxl..."
          "$BUNDLE_DIR/bin/python3.12" -m pip install openpyxl --quiet
          echo "Done. Python version:"
          "$BUNDLE_DIR/bin/python3.12" --version

      - name: Install Node deps
        run: npm ci

      - name: Build macOS DMG (arm64 + x64)
        run: npm run dist:mac
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download, install Python + openpyxl, bundle into build
        run: |
          $pythonInstaller = "python-3.12.9-amd64.exe"
          $installDir = "$env:TEMP\python-bundle"
          $bundleDir = "python\bundle"
          if (!(Test-Path "$installDir\python.exe")) {
            Write-Host "Downloading Python full installer..."
            curl -sL "https://www.python.org/ftp/python/3.12.9/$pythonInstaller" -o $pythonInstaller
            Write-Host "Installing Python silently to $installDir..."
            Start-Process -FilePath ".\$pythonInstaller" -ArgumentList "/quiet","InstallAllUsers=0","PrependPath=1","TargetDir=$installDir" -Wait
            Remove-Item $pythonInstaller
          }
          Write-Host "Installing openpyxl..."
          & "$installDir\python.exe" -m pip install openpyxl
          Write-Host "Bundling into python/bundle..."
          mkdir -Force $bundleDir
          Copy-Item "$installDir\*" "$bundleDir\" -Recurse -Force
          Write-Host "Done. Bundle:"
          Get-ChildItem $bundleDir | Select-Object Name

      - name: Install Node deps
        run: npm ci

      - name: Build Windows NSIS
        run: npm run dist:win
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: dist-electron/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare installers
        run: |
          mkdir -p artifacts/installers
          cp artifacts/macos-dmg/*.dmg artifacts/installers/ 2>/dev/null || true
          cp artifacts/windows-nsis/*.exe artifacts/installers/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/installers/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
